services:
  - type: web
    name: marki-game-server
    runtime: python
    numInstances: 1
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --ws-max-size 65536 --ws-ping-interval 30 --ws-ping-timeout 15
    envVars:
      - key: DISCONNECT_GRACE_SECONDS
        value: 180
      - key: CARDS_CACHE_TTL_SECONDS
        value: 300
